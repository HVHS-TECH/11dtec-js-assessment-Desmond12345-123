<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tung Tung Donut</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="head">
    <div class="header-container">
        <a href="index.html"><img src="Troll Face Tung tung tung sahur.png" alt="Logo of tung tung tung sahur" class="Logo-tung-tung"></a>

        <h1 class="title" style="font-family: Cosmic Sans;">Tung Tung Donut</h1>
        <a href="checkout.html"><h2 class="checkout" style="font-family: Cosmic Sans;" onclick="goToCheckout()">Checkout</h2></a>


        <!-- Cart Button-->
         <a href="cart.html"><button class="cart-button" onclick="goToCart()"> 🛒</button></a>
    </div>
</header>
<h1>Your Cart</h1>
<p>Items in your cart: </p>
<p id="cart-items"></p>
<a href="checkout.html" class="checkout-button">Proceed to Checkout</a>


<div id="cart-items"></div>
<script>
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    let output = "";

    cart.forEach(item => {
        if (item.count > 0) {
            output += `<p>${item.key}: ${item.count}</p>`;
        }
    });

    document.getElementById("cart-items").innerHTML = output;
</script>

</div>

<script src="script.js"></script>


</header>
</body>
</html>
