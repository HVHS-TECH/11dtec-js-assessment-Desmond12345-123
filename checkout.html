<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<header class="head">
    <div class="title">
        <h1 style="font-family: Cosmic Sans;">Tung Tung Donut</h1>
        <img src="Troll Face Tung tung tung sahur.png" alt="Logo of tung tung tung sahur" class="Logo-tung-tung">
        <!-- Cart Button-->
         <button class="cart-button" onclick="goToCart()"> 🛒</button>
    </div>
</header>

<h1>Checkout</h1>
<p>Review your order and enter your details</p>


<!--*************************************************************
  First and last name input forms start
**************************************************************-->
<form onsubmit="return false;">
    <label for="firstName">Enter your first name:</label>
    <input type = "text" id="firstName" name="formName" value="Name">
    <input type = "submit" onClick="getFirstname()">
</form>
<form onsubmit="return false;">
    <label for="lastName">Enter your last name:</label>
    <input type = "text" id="lastName" name="formName" value="Name">
    <input type = "submit" onClick="getLastname()">
</form>
<!--*************************************************************
  First and last name input forms end
**************************************************************-->


</body>
</html>
